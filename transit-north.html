<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>北部大眾運輸環島旅遊</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    .block { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h1, h2 { margin: 0 0 8px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>北部大眾運輸旅遊地圖</h1>
  <section class="block">
    <h2>景點與風景</h2>
    <ul>
      <li>台北：象山、北投、大稻埕河岸（捷運可達）。</li>
      <li>新北：九份、平溪、淡水漁人碼頭（台鐵+公車）。</li>
      <li>基隆：正濱漁港、和平島、八斗子海科館（客運可達）。</li>
    </ul>
  </section>
  <section class="block">
    <h2>活動、吃、住、購物</h2>
    <ul>
      <li>活動：平溪天燈、北海岸單車、夜間河岸散步。</li>
      <li>吃：寧夏夜市、基隆廟口、九份芋圓與海鮮。</li>
      <li>住：台北車站或板橋站周邊，轉車效率高。</li>
      <li>購物：西門町、信義商圈、南港 Lalaport。</li>
    </ul>
  </section>
  <p><a href="transit.html">回大眾運輸總覽</a> | <a href="index.html">回首頁</a></p>
</main>
</body>
</html>
