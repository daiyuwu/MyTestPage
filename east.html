<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>東部機車環島景點</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { margin: 0 0 8px; }
    .lead { color: #475569; margin: 0 0 20px; }
    .city { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>東部適合機車旅遊地點</h1>
  <p class="lead">東部是環島重點路段，海景長距離騎乘體驗完整。</p>

  <section class="city">
    <h2>花蓮縣</h2>
    <ul>
      <li>七星潭到鹽寮海岸：視野開闊，路線順暢。</li>
      <li>瑞穗到玉里縱谷段：平穩好騎，適合拉長里程。</li>
      <li>太魯閣周邊：壯觀峽谷景觀，需注意落石與天候。</li>
    </ul>
  </section>

  <section class="city">
    <h2>台東縣</h2>
    <ul>
      <li>台11線成功到都蘭：海岸與小鎮交錯，補給點固定。</li>
      <li>多良車站到太麻里：沿海視角佳，適合日出前後騎乘。</li>
      <li>鹿野高台周邊：丘陵路線舒適，適合半日行程。</li>
    </ul>
  </section>

  <p><a href="index.html">回首頁</a></p>
</main>
</body>
</html>
