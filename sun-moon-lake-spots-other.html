    .block { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }

<main>
  <h1>日月潭景點與風景</h1>

  <section class="block">
    <h2>必看景點</h2>
    <ul>
      <li>文武廟：俯瞰湖景視角完整，適合黃昏與夜景。</li>
      <li>玄光寺與阿婆茶葉蛋：搭船可達，行程好安排。</li>
      <li>向山遊客中心：建築與湖景結合，拍照點密集。</li>
      <li>慈恩塔：高點展望，天氣好時可見湖區全貌。</li>
    </ul>
  </section>

  <section class="block">
    <h2>風景路線</h2>
    <ul>
      <li>環湖公路：可分段停靠，視野變化大。</li>
      <li>水社碼頭到伊達邵：湖岸步道與商圈串連方便。</li>
      <li>朝霧碼頭周邊：適合清晨散步與觀景。</li>
    </ul>
  </section>
