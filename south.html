<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>南部機車環島景點</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { margin: 0 0 8px; }
    .lead { color: #475569; margin: 0 0 20px; }
    .city { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>南部適合機車旅遊地點</h1>
  <p class="lead">南部路線多為海岸、平原與短山路，適合中長距離巡航。</p>

  <section class="city">
    <h2>嘉義縣</h2>
    <ul>
      <li>阿里山公路前段：山路連續，建議清晨出發避車潮。</li>
      <li>東石漁港沿線：海線節奏輕鬆，適合黃昏時段。</li>
    </ul>
  </section>

  <section class="city">
    <h2>台南市</h2>
    <ul>
      <li>七股鹽山到將軍漁港：海風路線，停靠拍照點多。</li>
      <li>關子嶺周邊：山路短但變化明顯，適合半日騎乘。</li>
    </ul>
  </section>

  <section class="city">
    <h2>屏東縣</h2>
    <ul>
      <li>台26線（枋山到鵝鑾鼻）：環島經典海岸段，路線清楚。</li>
      <li>旭海到滿州：自然景觀完整，補給站需預先規劃。</li>
    </ul>
  </section>

  <p><a href="index.html">回首頁</a></p>
</main>
</body>
</html>
