<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>北部機車環島景點</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { margin: 0 0 8px; }
    .lead { color: #475569; margin: 0 0 20px; }
    .city { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>北部適合機車旅遊地點</h1>
  <p class="lead">以短彎海岸與山城路線為主，適合 1 到 2 天段落式騎乘。</p>

  <section class="city">
    <h2>新北市</h2>
    <ul>
      <li>北海岸（淡水到金山）：海景連續、補給點多。</li>
      <li>九份與金瓜石：山城景觀密集，適合半日慢騎。</li>
      <li>不厭亭到雙溪段：視野開闊，清晨騎乘體感佳。</li>
    </ul>
  </section>

  <section class="city">
    <h2>台北市</h2>
    <ul>
      <li>陽明山仰德大道至冷水坑：坡度變化多，假日需避開尖峰。</li>
      <li>貓空與指南宮周邊：短途練騎與夜景路線。</li>
    </ul>
  </section>

  <section class="city">
    <h2>宜蘭縣</h2>
    <ul>
      <li>濱海公路（頭城到蘇澳）：路況穩定，可串烏石港與南方澳。</li>
      <li>太平山聯外段：山路層次多，建議白天騎乘。</li>
    </ul>
  </section>

  <p><a href="index.html">回首頁</a></p>
</main>
</body>
</html>
