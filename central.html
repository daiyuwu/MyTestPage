<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中部機車環島景點</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 900px; margin: 0 auto; padding: 24px 16px 48px; }
    h1 { margin: 0 0 8px; }
    .lead { color: #475569; margin: 0 0 20px; }
    .city { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h2 { margin: 0 0 8px; font-size: 22px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>中部適合機車旅遊地點</h1>
  <p class="lead">中部適合安排山海混合路線，白天拉長里程、晚上回市區住宿。</p>

  <section class="city">
    <h2>苗栗縣</h2>
    <ul>
      <li>台3線南庄段：彎道節奏穩定，沿線客庄補給方便。</li>
      <li>三義到大湖：丘陵與山谷景色明顯，適合慢速巡航。</li>
    </ul>
  </section>

  <section class="city">
    <h2>台中市</h2>
    <ul>
      <li>新社、東勢、谷關路線：可當一日山線行程。</li>
      <li>高美濕地到大安濱海：傍晚海風舒適，適合輕旅行。</li>
    </ul>
  </section>

  <section class="city">
    <h2>南投縣</h2>
    <ul>
      <li>日月潭環湖：景點密集、停靠點多，適合攝影與休息。</li>
      <li>清境農場聯外道路：高海拔溫差大，需備保暖層。</li>
    </ul>
  </section>

  <p><a href="index.html">回首頁</a></p>
</main>
</body>
</html>
