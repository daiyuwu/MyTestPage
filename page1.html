<h1>FAQ</h1>

<h2>什麼是 Vertex AI Search？</h2>
<p>
Vertex AI Search 是一個企業級搜尋引擎，
可以將網站與文件內容轉換為可搜尋的資料，
並提供 AI 摘要功能。
</p>

<h2>什麼是 search summary？</h2>
<p>
Search summary 是由 AI 自動生成的內容摘要，
基於搜尋結果中的關鍵資訊產生。
</p>
