    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; line-height: 1.7; }
    main { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    .block { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }

    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>

<body>
<main>
  <h1>日月潭吃住購物與交通</h1>

  <section class="block">
    <h2>吃什麼</h2>
    <ul>
      <li>伊達邵商圈：邵族風味料理、小吃、山豬肉與竹筒飯。</li>
      <li>水社商圈：簡餐、咖啡店與湖景餐廳選擇較多。</li>
      <li>伴手禮：紅茶、香菇、在地農產與茶點。</li>
    </ul>
  </section>

  <section class="block">
    <h2>住哪裡</h2>
    <ul>
      <li>水社碼頭周邊：交通與機能最好，適合首次造訪。</li>
      <li>伊達邵周邊：晚間商圈熱鬧，適合想逛街吃小吃。</li>
      <li>湖景飯店與民宿：建議提前預訂熱門假日房型。</li>
    </ul>
  </section>

  <section class="block">
    <h2>購物與交通</h2>
    <ul>
      <li>購物：水社與伊達邵為主要採買區，店家集中。</li>
      <li>大眾運輸：高鐵台中站或台鐵台中站轉客運直達。</li>
      <li>區內移動：遊湖船、公車、步行與單車最常用。</li>
    </ul>
  </section>
