<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>東部大眾運輸環島旅遊</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    .block { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h1, h2 { margin: 0 0 8px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>東部大眾運輸旅遊地圖</h1>
  <section class="block">
    <h2>景點與風景</h2>
    <ul>
      <li>花蓮：七星潭、清水斷崖、太魯閣入口周邊。</li>
      <li>台東：三仙台、都蘭海岸、多良車站、池上稻田。</li>
      <li>縱谷線：玉里、瑞穗、關山，慢節奏鐵道旅行。</li>
    </ul>
  </section>
  <section class="block">
    <h2>活動、吃、住、購物</h2>
    <ul>
      <li>活動：賞海日出、部落手作體驗、單車田野巡禮。</li>
      <li>吃：花蓮扁食、台東米食便當、在地海鮮。</li>
      <li>住：花蓮車站、台東車站或市區民宿，方便隔日轉車。</li>
      <li>購物：花蓮文創園區、鐵花新聚落、池上農特產店。</li>
    </ul>
  </section>
  <p><a href="transit.html">回大眾運輸總覽</a> | <a href="index.html">回首頁</a></p>
</main>
</body>
