  <h1>台灣大眾運輸環島旅遊總覽</h1>
  <p class="lead">以台鐵、高鐵、客運與市區公車規劃 7 到 12 天環島，適合不開車也能輕鬆旅行。</p>

  <section class="block">
    <h2>建議路線</h2>
    <ul>
      <li>西部幹線：高鐵與台鐵密集，適合快速換城市。</li>
      <li>東部幹線：以台鐵為主，花東建議提早訂票。</li>
      <li>離島與偏鄉支線：搭配台灣好行、公路客運、在地接駁。</li>
      <li>行程節奏：每 2 到 3 天換區域，減少拉車疲勞。</li>
    </ul>
  </section>
