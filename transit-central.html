<!DOCTYPE html>

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>中部大眾運輸環島旅遊</title>
  <style>
    body { font-family: "Noto Sans TC", "Microsoft JhengHei", sans-serif; margin: 0; background: #f8fafc; color: #1f2937; }
    main { max-width: 920px; margin: 0 auto; padding: 24px 16px 48px; }
    .block { background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; padding: 16px; margin-bottom: 14px; }
    h1, h2 { margin: 0 0 8px; }
    ul { margin: 0; padding-left: 20px; }
    a { color: #1d4ed8; }
  </style>
</head>
<body>
<main>
  <h1>中部大眾運輸旅遊地圖</h1>
  <section class="block">
    <h2>景點與風景</h2>
    <ul>
      <li>台中：高美濕地、國家歌劇院、彩虹眷村（公車方便）。</li>
      <li>南投：日月潭、清境、溪頭（台灣好行接駁）。</li>
      <li>彰化：鹿港老街、扇形車庫、八卦山大佛（台鐵+公車）。</li>
    </ul>
  </section>
  <section class="block">
    <h2>活動、吃、住、購物</h2>
    <ul>
      <li>活動：日月潭遊湖、鹿港文化導覽、草悟道散策。</li>
      <li>吃：台中第二市場、逢甲夜市、鹿港小吃。</li>
      <li>住：台中車站與台中捷運綠線沿線，移動彈性高。</li>
      <li>購物：台中勤美誠品、三井 LaLaport、outlet 商場。</li>
    </ul>
  </section>
  <p><a href="transit.html">回大眾運輸總覽</a> | <a href="index.html">回首頁</a></p>
</main>
